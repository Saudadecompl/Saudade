<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>s</title>
    <script src="teksty.js"></script>
    <style>
        html { scroll-behavior: smooth; }
        body {
            margin: 0; padding: 0;
            background-color: #111111;
            color: #bcbcbc;
            font-family: "Georgia", serif;
            line-height: 1.8;
            letter-spacing: 0.02em;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        main {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }

        nav {
            position: fixed; top: 40px; width: 100%;
            display: flex; justify-content: center; gap: 40px; z-index: 100;
        }

        nav a {
            text-decoration: none; color: #bcbcbc; font-size: 0.75rem;
            text-transform: lowercase; opacity: 0.2; transition: opacity 0.8s;
        }

        nav a:hover { opacity: 0.7; }

        section {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 0 15%; box-sizing: border-box; scroll-snap-align: start;
        }

        .poem { text-align: center; font-size: 1.2rem; white-space: pre-line; color: #cccccc; }

        .voice-section { justify-content: flex-start; padding-left: 15%; }
        .voice { text-align: left; color: #777777; font-size: 1rem; font-style: italic; max-width: 500px; white-space: pre-line; }

        .footer-tools { position: fixed; bottom: 30px; right: 40px; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 100; }
        .back-to-top { text-decoration: none; color: #bcbcbc; font-size: 0.9rem; opacity: 0.1; transition: opacity 0.5s; }
        .back-to-top:hover { opacity: 0.5; }
        .sigil { font-size: 0.7rem; opacity: 0.1; user-select: none; }

        @media (max-width: 600px) {
            section { padding: 0 10%; }
            .voice-section { padding-left: 10%; }
        }

        main::-webkit-scrollbar { display: none; }
        main { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <nav>
        <a href="#wiersz-0">wiersze</a>
        <a href="#glos-0">głosy</a>
    </nav>

    <div class="footer-tools">
        <a href="#wiersz-0" class="back-to-top">↑</a>
        <div class="sigil">s</div>
    </div>

    <main id="container"></main>

    <script>
        const container = document.getElementById('container');

        // Funkcja budująca stronę
        if (typeof WIERSZE !== 'undefined' && typeof GLOSY !== 'undefined') {
            WIERSZE.forEach((t, i) => {
                container.innerHTML += `<section id="wiersz-${i}"><div class="poem">${t}</div></section>`;
            });
            GLOSY.forEach((t, i) => {
                container.innerHTML += `<section id="glos-${i}" class="voice-section"><div class="voice">${t}</div></section>`;
            });
        } else {
            container.innerHTML = `<section><div class="poem">Błąd: Nie znaleziono pliku teksty.js</div></section>`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>s</title>
    <script src="teksty.js"></script>
    <style>
        /* --- ESTETYKA I FUNDAMENTY MEDYTACYJNE --- */
        html { 
            scroll-behavior: smooth; 
        }

        body {
            margin: 0; 
            padding: 0;
            background-color: #111111; /* Ciemne tło */
            color: #bcbcbc;           /* Przygaszony tekst */
            font-family: "Georgia", serif;
            line-height: 1.8;
            letter-spacing: 0.02em;
            -webkit-font-smoothing: antialiased;
            overflow: hidden; /* Scroll obsługiwany przez <main> */
        }

        /* Kontener przewijania - Efekt stron książki + "Zatrzymanie się" */
        main {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }

        /* --- NAWIGACJA (DYSKRETNA) --- */
        nav {
            position: fixed; 
            top: 40px; 
            width: 100%;
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            z-index: 100;
        }

        nav a {
            text-decoration: none; 
            color: #bcbcbc; 
            font-size: 0.75rem;
            text-transform: lowercase; 
            opacity: 0.15; /* Ledwo widoczne, by nie rozpraszać */
            transition: opacity 1s ease;
        }

        nav a:hover { 
            opacity: 0.5; 
        }

        /* --- STRUKTURA SEKCJI + ANIMACJA POJAWIANIA SIĘ --- */
        section {
            height: 100vh; 
            display: flex; 
            align-items: center; 
            box-sizing: border-box; 
            scroll-snap-align: start;
            /* KLUCZOWE: Nie pozwala przeskoczyć kilku sekcji naraz */
            scroll-snap-stop: always; 
            position: relative;
        }

     /* Tekst jest domyślnie niewidoczny i nieco niżej */
        section .content {
            opacity: 0; 
            transform: translateY(5px); 
            /* Czas trwania: 3 sekundy, Opóźnienie: 0.5 sekundy */
            transition: opacity 3s ease-in-out 0.5s, transform 3s ease-in-out 0.5s;
        }

       /* Klasa dodawana przez JS, gdy sekcja wskoczy na ekran */
        section.is-visible .content {
            opacity: 1;
            transform: translateY(0);
        }

        /* Styl dla Wierszy (Środek) */
        .poem-section {
            justify-content: center;
            padding: 0 15%;
        }

        .poem { 
            text-align: center; 
            font-size: 1.25rem; 
            white-space: pre-line; 
            color: #cccccc; 
            max-width: 600px;
        }

        /* Styl dla Głosów (Asymetria) */
        .voice-section { 
            justify-content: flex-start; 
            padding-left: 20%; 
            padding-right: 10%;
        }

        .voice { 
            text-align: left; 
            color: #666666; /* Jeszcze ciemniejszy szary dla głosów */
            font-size: 0.95rem; 
            font-style: italic; 
            max-width: 450px; 
            white-space: pre-line;
            padding-left: 25px;
            /* Subtelna pionowa linia z lewej */
            border-left: 1px solid rgba(119, 119, 119, 0.15); 
        }

        /* --- DETALE DOLNE --- */
        .footer-tools { 
            position: fixed; 
            bottom: 30px; 
            right: 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px; 
            z-index: 100; 
        }

        /* --- DETALE DOLNE (Ulepszona Strzałka) --- */
        .footer-tools { 
            position: fixed; 
            bottom: 30px; 
            right: 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px; 
            z-index: 100; 
        }

       /* --- DETALE DOLNE (Silniejszy, medytacyjny puls) --- */
        .footer-tools { 
            position: fixed; 
            bottom: 30px; 
            right: 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px; 
            z-index: 100; 
        }

        .back-to-top { 
            text-decoration: none; 
            color: #bcbcbc; 
            font-size: 1.1rem; /* Odrobinę większa, by była wyraźniejsza */
            
            /* Domyślnie jest ciemniejsza, ale widoczna */
            opacity: 0.15; 
            
            /* Płynne rozjaśnianie przy najechaniu i silniejsza pulsująca animacja */
            transition: opacity 1.5s ease-in-out; 
            
            /* Uruchamia pulsującą animację, która trwa 8 sekund i zapętla się */
            /* Wydłużona do 8s, by puls był jeszcze bardziej leniwy */
            animation: breathe_strong 8s ease-in-out infinite;
        }

        /* Przy najechaniu myszką rozjaśnia się mocno, sygnalizując interakcję */
        .back-to-top:hover { 
            opacity: 0.8; 
            /* Zatrzymuje puls, gdy czytelnik chce kliknąć */
            animation: none; 
        }

        /* Definicja animacji "silniejszego oddychania" dla strzałki */
        @keyframes breathe_strong {
            /* Start: Ciemniejsza (0.15) */
            0%, 100% { opacity: 0.15; transform: translateY(0); }
            /* Środek: Rozjaśnia się wyraźnie (0.6) i unosi lekko */
            /* To 0.6 powinno być widoczne nawet przez pomarańczowy filtr */
            50%      { opacity: 0.6; transform: translateY(-4px); } 
        }

        .sigil { 
            font-size: 0.7rem; 
            opacity: 0.08; 
            user-select: none; 
            cursor: default;
        }

        /* --- RESPONSYWNOŚĆ (TELEFONY) --- */
        @media (max-width: 600px) {
            .poem-section { padding: 0 10%; }
            .voice-section { padding-left: 12%; padding-right: 8%; }
            nav { top: 30px; gap: 25px; }
            .footer-tools { right: 20px; bottom: 20px; }
            .poem { font-size: 1.15rem; }
        }

        /* Ukrycie paska przewijania */
        main::-webkit-scrollbar { display: none; }
        main { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <nav id="top-nav">
        </nav>

    <div class="footer-tools">
        <a href="#" id="scroll-up" class="back-to-top">↑</a>
        <div class="sigil">s</div>
    </div>

    <main id="container"></main>

    <script>
        const container = document.getElementById('container');
        const nav = document.getElementById('top-nav');
        const scrollUp = document.getElementById('scroll-up');

        let currentIndex = 0; 
        const allContent = []; 

        function prepareData() {
            // Sprawdzamy, czy wiersze są wczytane z teksty.js [cite: 12]
            if (typeof WIERSZE !== 'undefined' && typeof GLOSY !== 'undefined') {
                WIERSZE.forEach((t, i) => allContent.push({ text: t, type: 'poem', id: `wiersz-${i}` }));
                GLOSY.forEach((t, i) => allContent.push({ text: t, type: 'voice', id: `glos-${i}` }));

                nav.innerHTML = `<a href="#" onclick="window.location.reload()">od nowa</a>`;
                
                // Ładujemy tylko 2 pierwsze wiersze na start [cite: 13, 14]
                loadNextSection();
                loadNextSection();
            }
        }

        function loadNextSection() {
            if (currentIndex >= allContent.length) return;

            const item = allContent[currentIndex];
            const section = document.createElement('section');
            section.id = item.id;
            section.className = item.type === 'poem' ? 'poem-section' : 'voice-section';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = `content ${item.type}`;
            
            // Wstawiamy tekst do DOM dopiero w momencie skrolowania [cite: 1, 2, 13]
            contentDiv.innerText = item.text;

            section.appendChild(contentDiv);
            container.appendChild(section);

            observer.observe(section);
            currentIndex++;
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    
                    const sections = document.querySelectorAll('section');
                    if (entry.target === sections[sections.length - 1]) {
                        loadNextSection();
                    }
                }
            });
        }, { threshold: 0.8 });

        window.onload = prepareData;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>s</title>
    <script src="teksty.js"></script>
    <style>
        /* --- ESTETYKA I FUNDAMENTY MEDYTACYJNE --- */
        html { 
            scroll-behavior: smooth; 
        }

        body {
            margin: 0; 
            padding: 0;
            background-color: #111111; /* Ciemne tło */
            color: #bcbcbc;           /* Przygaszony tekst */
            font-family: "Georgia", serif;
            line-height: 1.8;
            letter-spacing: 0.02em;
            -webkit-font-smoothing: antialiased;
            overflow: hidden; /* Scroll obsługiwany przez <main> */
        }

        /* Kontener przewijania - Efekt stron książki + "Zatrzymanie się" */
        main {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }

        /* --- NAWIGACJA (DYSKRETNA) --- */
        nav {
            position: fixed; 
            top: 40px; 
            width: 100%;
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            z-index: 100;
        }

        nav a {
            text-decoration: none; 
            color: #bcbcbc; 
            font-size: 0.75rem;
            text-transform: lowercase; 
            opacity: 0.15; /* Ledwo widoczne, by nie rozpraszać */
            transition: opacity 1s ease;
        }

        nav a:hover { 
            opacity: 0.5; 
        }

        /* --- STRUKTURA SEKCJI + ANIMACJA POJAWIANIA SIĘ --- */
        section {
            height: 100vh; 
            display: flex; 
            align-items: center; 
            box-sizing: border-box; 
            scroll-snap-align: start;
            /* KLUCZOWE: Nie pozwala przeskoczyć kilku sekcji naraz */
            scroll-snap-stop: always; 
            position: relative;
        }

        /* Tekst jest domyślnie niewidoczny */
        section .content {
            opacity: 0; 
            transform: translateY(10px); /* Delikatne przesunięcie w górę */
            transition: opacity 2s ease-out, transform 2.5s ease-out; /* Powolne odsłanianie */
        }

        /* Klasa dodawana przez JS, gdy sekcja jest na ekranie */
        section.is-visible .content {
            opacity: 1;
            transform: translateY(0);
        }

        /* Styl dla Wierszy (Środek) */
        .poem-section {
            justify-content: center;
            padding: 0 15%;
        }

        .poem { 
            text-align: center; 
            font-size: 1.25rem; 
            white-space: pre-line; 
            color: #cccccc; 
            max-width: 600px;
        }

        /* Styl dla Głosów (Asymetria) */
        .voice-section { 
            justify-content: flex-start; 
            padding-left: 20%; 
            padding-right: 10%;
        }

        .voice { 
            text-align: left; 
            color: #666666; /* Jeszcze ciemniejszy szary dla głosów */
            font-size: 0.95rem; 
            font-style: italic; 
            max-width: 450px; 
            white-space: pre-line;
            padding-left: 25px;
            /* Subtelna pionowa linia z lewej */
            border-left: 1px solid rgba(119, 119, 119, 0.15); 
        }

        /* --- DETALE DOLNE --- */
        .footer-tools { 
            position: fixed; 
            bottom: 30px; 
            right: 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px; 
            z-index: 100; 
        }

        .back-to-top { 
            text-decoration: none; 
            color: #bcbcbc; 
            font-size: 0.9rem; 
            opacity: 0.08; 
            transition: opacity 1s; 
        }

        .back-to-top:hover { 
            opacity: 0.4; 
        }

        .sigil { 
            font-size: 0.7rem; 
            opacity: 0.08; 
            user-select: none; 
        }

        /* --- RESPONSYWNOŚĆ (TELEFONY) --- */
        @media (max-width: 600px) {
            .poem-section { padding: 0 10%; }
            .voice-section { padding-left: 12%; padding-right: 8%; }
            nav { top: 30px; gap: 25px; }
            .footer-tools { right: 20px; bottom: 20px; }
            .poem { font-size: 1.15rem; }
        }

        /* Ukrycie paska przewijania */
        main::-webkit-scrollbar { display: none; }
        main { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <nav id="top-nav">
        </nav>

    <div class="footer-tools">
        <a href="#" id="scroll-up" class="back-to-top">↑</a>
        <div class="sigil">s</div>
    </div>

    <main id="container"></main>

    <script>
        const container = document.getElementById('container');
        const nav = document.getElementById('top-nav');
        const scrollUp = document.getElementById('scroll-up');

        // Funkcja budująca strukturę strony z danych w teksty.js
        function buildSite() {
            if (typeof WIERSZE !== 'undefined' && typeof GLOSY !== 'undefined') {
                
                // Generowanie wierszy
                WIERSZE.forEach((t, i) => {
                    container.innerHTML += `
                        <section id="wiersz-${i}" class="poem-section">
                            <div class="content poem">${t}</div>
                        </section>`;
                });

                // Generowanie głosów
                GLOSY.forEach((t, i) => {
                    container.innerHTML += `
                        <section id="glos-${i}" class="voice-section">
                            <div class="voice content">${t}</div>
                        </section>`;
                });

                // Ustawienie linków w menu
                nav.innerHTML = `
                    <a href="#wiersz-0">wiersze</a>
                    <a href="#glos-0">głosy</a>
                `;
                
                // Ustawienie strzałki powrotu
                scrollUp.href = "#wiersz-0";

                // Uruchomienie obserwatora przewijania (dla animacji fadeIn)
                startObserver();

            } else {
                container.innerHTML = `<section class="poem-section"><div class="poem content">Nie znaleziono pliku teksty.js lub plik jest pusty.</div></section>`;
            }
        }

        // Mechanizm wykrywający, kiedy sekcja jest na ekranie
        function startObserver() {
            const sections = document.querySelectorAll('section');
            const options = {
                root: container, // Obserwujemy wewnątrz kontenera <main>
                threshold: 0.6   // Sekcja musi być w 60% widoczna, by dodać klasę
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                    } else {
                        // Jeśli chcesz, by tekst znikał przy przewijaniu w dół (medytacyjne, ale trudniejsze w odbiorze)
                        entry.target.classList.remove('is-visible'); 
                    }
                });
            }, options);

            sections.forEach(section => {
                observer.observe(section);
            });
        }

        // Start
        window.onload = buildSite;
    </script>
</body>
</html>
